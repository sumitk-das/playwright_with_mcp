name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - all

jobs:
  playwright-tests:
    name: ${{ github.event_name == 'workflow_dispatch' && format('Run {0} tests', inputs.suite) || 'Smoke Tests' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run smoke tests
        if: github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke'
        run: pytest tests/smoke/ -m smoke --browser chromium
        env:
          BASE_URL: https://automationexercise.com
          HEADLESS: "true"

      - name: Run all tests
        if: github.event_name == 'workflow_dispatch' && inputs.suite == 'all'
        run: pytest tests/ --browser chromium
        env:
          BASE_URL: https://automationexercise.com
          HEADLESS: "true"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
